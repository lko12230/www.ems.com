    <style>
        /* Spinner Styles */
        .spinner-2 {
            width: 150px;
            height: 150px;
            display: none; /* Initially hidden */
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            overflow: hidden;
            position: fixed;
            top: 50%; /* Center vertically */
            left: 50%; /* Center horizontally */
            transform: translate(-50%, -50%);
            animation: text-color 2s ease-in-out infinite alternate;
            z-index: 1000; /* Ensure it's above other elements */
        }

        .spinner-2::before,
        .spinner-2::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid transparent;
            mix-blend-mode: overlay;
            animation: rotate var(--duration) var(--timing) infinite;
            pointer-events: none;
        }

        .spinner-2::before {
            border-left-color: lightblue;
            --duration: 2s;
            --timing: ease-in;
        }

        .spinner-2::after {
            border-right-color: lightgreen;
            --duration: 2.5s;
            --timing: ease-out;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes text-color {
            0% {
                color: rgba(0, 0, 0, 1);
            }

            50% {
                color: rgba(0, 0, 0, .5);
            }

            100% {
                color: rgba(0, 0, 0, .1);
            }
        }
    </style>

  <script>
    $(document).ready(function () {
        // Function to update live date and time every second
        function updateLiveDateTime() {
            var now = new Date();
            var formattedDateTime = now.toLocaleString(); // Adjust as per your required format
            $("#liveDateTime").val(formattedDateTime);
        }

        // Initial call to update live date and time
        updateLiveDateTime();

        // Update live date and time every second
        setInterval(updateLiveDateTime, 1000);

        // Show spinner only on form submission for sign-in
        $(document).on('submit', '#login-form', function () {
            $('#signinformSpinner').css('display', 'flex'); // Show verifying spinner
        });

        // Hide spinner on page load
        $(window).on('load', function () {
            $('#genericSpinner').css('display', 'none');
        });

        // For navigation links
        $('.navbar-nav a').on('click', function (e) {
            const href = $(this).attr('href');
            if (href && href !== '#') {
                $('#genericSpinner').css('display', 'flex'); // Show loading spinner
            }
        });
    });

    // Separate handling for forgot password and sign-up links
    $('#forgotPasswordLink, #SignupLink').on('click', function () {
        $('#genericSpinner').css('display', 'flex'); // Show spinner for forgot password or sign-up
    });

    // Toggle password visibility
    function myFunction() {
        var x = document.getElementById("password");
        if (x.type === "password") {
            x.type = "text";
        } else {
            x.type = "password";
        }
    }

    // Window onLoad function to determine current page and log activity
    window.onload = async function () {
        const email = 'user@gmail.com'; // Replace with dynamic email if available

        // Check if email is available
        if (!email) {
            console.error('Email is not available');
            return; // Prevent further execution if email is missing
        }

        // Get the current path
        const currentPath = window.location.pathname;

        // Set functionality based on the route
        let functionality;
        if (currentPath.includes('/signin')) {
            functionality = 'Sign In';
        } else if (currentPath.includes('/signup')) {
            functionality = 'Sign Up';
        } else if (currentPath.includes('/forgot')) {
            functionality = 'Forgot Password';
        } else if (currentPath.includes('/oauth2')) {
            functionality = 'OAuth2 Login';
        } else if (currentPath.includes('/css') || currentPath.includes('/js') || currentPath.includes('/img')) {
            functionality = 'Static Resources Loaded';
        } else if (currentPath === '/') {
            functionality = 'Home Page';
        } else if (currentPath.includes('/verify_admin_get')) {
            functionality = 'Verify Admin (Get)';
        } else if (currentPath.includes('/verify_admin')) {
            functionality = 'Verify Admin';
        } else if (currentPath.includes('/verify-otp2')) {
            functionality = 'Verify OTP2';
        } else if (currentPath.includes('/do-register')) {
            functionality = 'Register User';
        } else if (currentPath.includes('/send-otp')) {
            functionality = 'Send OTP';
        } else if (currentPath.includes('/verify-otp')) {
            functionality = 'Verify OTP';
        } else if (currentPath.includes('/change-password')) {
            functionality = 'Change Password';
        } else if (currentPath.includes('/resendotp')) {
            functionality = 'Resend OTP';
        } else if (currentPath.includes('/log-activity')) {
            functionality = 'Log Activity';
        }  else if (currentPath.includes('/about')) {
            functionality = 'About';
        }else if (currentPath.includes('/contact_us')) {
            functionality = 'contact_us';
        }else {
            functionality = 'Page Loaded';
        }

        // Log activity
        await logActivity(email, functionality);
    };

    // Function to log activity to the server
    async function logActivity(email, functionality) {
        try {
            console.log("Attempting to log activity...");

            // Fetch client IP address
            const ipAddress = await getClientIp();

            // Prepare activity data
            const data = {
                email: email,
                ipAddress: ipAddress,
                functionality: functionality,
            };

            console.log('Logging activity:', data);

            // Send the log activity request
            const response = await fetch('/log-activity', {  // Ensure the URL is correct
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            });

            console.log("Response status:", response.status); // Log response status

            // Check the response from the server
            if (response.ok) {
                console.log('Activity logged successfully');
            } else {
                console.error('Failed to log activity:', response.statusText);
            }
        } catch (error) {
            console.error('Error during log activity:', error);
        }
    }

    // Function to get client's IP address
    async function getClientIp() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            if (!response.ok) {
                throw new Error('Failed to fetch IP address');
            }
            const data = await response.json();
            return data.ip;
        } catch (error) {
            console.error('Error fetching IP address:', error);
            return 'Unknown IP'; // Fallback value if IP can't be fetched
        }
    }
</script>
