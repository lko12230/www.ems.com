<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="base::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <title>Two-Factor Authentication - EMS</title>
    <link rel="icon" type="image/x-icon" href="https://bootdey.com/img/Content/avatar/avatar7.png">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.0/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f7f9fc;
        }

        .wrapper {
            width: 400px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 100px;
        }

        .logo img {
            width: 80px;
            height: 80px;
            margin-bottom: 10px;
        }

        .form-field {
            position: relative;
            margin-bottom: 20px;
        }

        .form-field i {
            position: absolute;
            left: 10px;
            top: 12px;
            color: #aaa;
        }

        .form-control {
            padding-left: 40px;
        }

        .btn {
            width: 100%;
            background-color: royalblue;
            color: white;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #003eaa;
        }

        .alert {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }

        .resend {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .resend a {
            color: royalblue;
            text-decoration: none;
            font-weight: 500;
        }

        .resend a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
<section>
    <div class="wrapper">
        <div class="logo text-center">
            <img src="https://bootdey.com/img/Content/avatar/avatar7.png" alt="Logo">
        </div>

        <div class="text-center mt-2 name">
            <span style="color: royalblue;">w</span><span style="color: red;">w</span><span
                style="color: #F7B529;">w</span><span style="color: royalblue;">.</span><span
                style="color: limegreen;">e</span><span style="color: red;">m</span><span
                style="color: royalblue;">s</span><span style="color: red;">.</span><span
                style="color: #F7B529;">c</span><span style="color: royalblue;">o</span><span
                style="color: limegreen;">m</span>
        </div>

        <!-- 🔔 Alert Messages Section -->
<div th:if="${otp_success_message}" class="alert alert-success" th:text="${otp_success_message}"></div>
<div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>


        <h5 class="text-center mt-4 mb-2">🔐 Two-Factor Authentication</h5>
        <p class="text-center mb-3">Please enter the 6-digit code sent to your email</p>

        <form th:action="@{/do-verify-otp2fa}" method="post" class="form p-3">
            <div class="form-field d-flex align-items-center">
                <i class="fa-solid fa-key"></i>
                <input type="number" name="otp" placeholder="Enter OTP" class="form-control"
                       required minlength="6" maxlength="6"/>
            </div>
            <button type="submit" class="btn mt-3">Verify Code</button>
        </form>

        <div class="resend">
            Didn’t receive the code?
            <a th:href="@{'/resend-otp'(email=${email})}">Resend OTP</a>
        </div>
    </div>
</section>

<!-- Optional: Auto-dismiss alerts after 5 seconds -->
<script>
    setTimeout(() => {
        document.querySelectorAll('.alert').forEach(el => el.style.display = 'none');
    }, 5000);
</script>

</body>
</html>
