<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon"
    href="https://www.freepnglogos.com/uploads/google-logo-png/google-logo-png-webinar-optimizing-for-success-google-business-webinar-13.png">
  <title>www.ems.com Server Under Maintenance</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      color: #f1f1f1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-align: center;
    }

    .container {
      background: rgba(0, 0, 0, 0.6);
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      padding: 40px 35px;
      width: 100%;
      max-width: 480px;
      animation: fadeIn 1.2s ease forwards;
      color: #eee;
      user-select: none;
    }

    .logo {
      margin-bottom: 30px;
      display: inline-block;
    }
    .logo img {
      width: 180px;
      height: auto;
      object-fit: contain;
    }

    h1, h2 {
      font-size: 2.2rem;
      margin-bottom: 20px;
      font-weight: 700;
      animation: pulse 2.5s ease-in-out infinite;
      color: #ff6b6b;
      text-shadow: 0 0 12px #ff6b6b;
      transition: color 0.5s, text-shadow 0.5s;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 30px;
      opacity: 0.85;
    }

    .maintenance-image {
      max-width: 350px;
      width: 100%;
      height: auto;
      margin-bottom: 10px;
    }

    .time-info {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 18px 25px;
      font-size: 1rem;
      margin-top: 20px;
      color: #fafafa;
    }
    .time-info > div { margin-bottom: 8px; }
    .time-info strong { font-weight: 600; color: #ffd6d6; }

    .loader {
      border: 7px solid rgba(255,255,255,0.2);
      border-top: 7px solid #ff6b6b;
      border-radius: 50%;
      width: 65px;
      height: 65px;
      margin: 25px auto 0;
      animation: spin 1.2s linear infinite;
    }

    footer {
      font-size: 0.85rem;
      opacity: 0.5;
      margin-top: 30px;
    }

    @keyframes spin {
      0% { transform: rotate(0); }
      100% { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { color: #ff6b6b; text-shadow: 0 0 12px #ff6b6b; }
      50% { color: #ffb3b3; text-shadow: 0 0 18px #ffb3b3; }
    }

    @media (max-width: 600px) {
      .container { padding: 30px 20px; }
      h1, h2 { font-size: 1.8rem; }
      p { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo" aria-label="Go to Homepage">
      <img th:src="@{/img/EMS.png}" alt="EMS Logo" />
    </a>

    <img th:src="@{/img/server_maintenance.jpg}" alt="server_maintenance" class="maintenance-image" />

    <p id="mainTitle">🚧 Server Under Maintenance</p>

    <p id="mainMessage">
      We’re performing some upgrades to improve your experience.<br />
      Please check back in a little while.
    </p>

    <div class="loader" id="loader"></div>

    <div class="time-info" id="timeSection" style="display:none;">
      <div><strong>Downtime Start:</strong> <span id="startTime"></span></div>
      <div><strong>Downtime End:</strong> <span id="endTime"></span></div>
      <div><strong>Time Remaining:</strong> <span id="remainingTime"></span></div>
    </div>

    <footer>© 2025 WWW.EMS.COM | All Rights Reserved</footer>
  </div>

  <script th:inline="javascript">
  /*<![CDATA[*/
  const initialServerDown = /*[[${serverDown}]]*/ false;
  const initialServerDownManually = /*[[${serverDownManually}]]*/ false;
  const initialScheduledStart = /*[[${scheduledStart}]]*/ null;
  const initialScheduledEnd = /*[[${scheduledEnd}]]*/ null;
  const initialManualStart = /*[[${manualStart}]]*/ null;
  const initialManualEnd = /*[[${manualEnd}]]*/ null;

  function toDate(ts) {
    return ts !== null ? new Date(ts) : null;
  }

  function formatDateTime(date) {
    if (!date) return '';
    return date.toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  }

  let countdownInterval = null;

  function updateUI(serverDown, serverDownManually, scheduledStart, scheduledEnd, manualStart, manualEnd) {
    const loader = document.getElementById("loader");
    const timeSection = document.getElementById("timeSection");
    const startTimeEl = document.getElementById("startTime");
    const endTimeEl = document.getElementById("endTime");
    const remainingTimeEl = document.getElementById("remainingTime");
    const mainTitle = document.getElementById("mainTitle");
    const mainMessage = document.getElementById("mainMessage");

    if (countdownInterval) {
      clearInterval(countdownInterval);
      countdownInterval = null;
    }

    if (serverDown) {
      loader.style.display = "block";
      timeSection.style.display = "block";

      const start = serverDownManually ? toDate(manualStart) : toDate(scheduledStart);
      const end = serverDownManually ? toDate(manualEnd) : toDate(scheduledEnd);

      startTimeEl.textContent = formatDateTime(start);
      endTimeEl.textContent = formatDateTime(end);

      mainTitle.textContent = "🚧 Server Under Maintenance";
      mainTitle.style.color = "#ff6b6b";
      mainTitle.style.textShadow = "0 0 12px #ff6b6b";
      mainMessage.innerHTML = "We’re performing some upgrades to improve your experience.<br />Please check back in a little while.";

      function updateRemainingTime() {
        const now = new Date();
        if (!start || !end) {
          remainingTimeEl.textContent = "Time data unavailable";
          return;
        }
        if (now > end) {
          updateUI(false, false, null, null, null, null);
          return;
        } else if (now < start) {
          remainingTimeEl.textContent = "Maintenance has not started yet";
        } else {
          const diff = end - now;
          const minutes = Math.floor(diff / 60000);
          const seconds = Math.floor((diff % 60000) / 1000);
          remainingTimeEl.textContent = `${minutes}m ${seconds}s`;
        }
      }

      updateRemainingTime();
      countdownInterval = setInterval(updateRemainingTime, 1000);

    } else {
      loader.style.display = "none";
      timeSection.style.display = "none";
      mainTitle.textContent = "✅ Server is Running";
      mainTitle.style.color = "#4BB543";
      mainTitle.style.textShadow = "0 0 12px #4BB543";
      mainMessage.textContent = "All systems are operational. You can continue using the service.";
    }
  }

  updateUI(
    initialServerDown,
    initialServerDownManually,
    initialScheduledStart,
    initialScheduledEnd,
    initialManualStart,
    initialManualEnd
  );

  async function fetchServerStatus() {
    try {
      const response = await fetch('/api/server-status');
      if (!response.ok) throw new Error("Failed to fetch server status");
      const data = await response.json();

      updateUI(
        data.serverDown,
        data.serverDownManually,
        data.scheduledStart,
        data.scheduledEnd,
        data.manualStart,
        data.manualEnd
      );
    } catch (error) {
      console.error("Error fetching server status:", error);
    }
  }

  setInterval(fetchServerStatus, 15000);
  /*]]>*/
  </script>

  <script>
    document.addEventListener('contextmenu', function (event) {
      event.preventDefault();
      alert("Right-clicking is disabled on EMS.");
    });
  </script>
</body>
</html>
