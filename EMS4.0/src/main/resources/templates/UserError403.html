<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>403 Access Denied | EMS Portal</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #212529;
        }

        .card {
            background-color: #fff;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        .card h1 {
            font-size: 72px;
            margin: 0;
            color: #d32f2f;
        }

        .card h2 {
            font-size: 24px;
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 10px;
            color: #343a40;
        }

        .card p {
            font-size: 15px;
            color: #6c757d;
            margin-bottom: 30px;
        }

        .button {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            background-color: #0d6efd;
            color: #fff;
            font-size: 14px;
            transition: background-color 0.3s ease;
            font-weight: 500;
        }

        .button:hover {
            background-color: #0b5ed7;
        }

        .card small {
            display: block;
            margin-top: 25px;
            font-size: 12px;
            color: #adb5bd;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>403</h1>
        <h2 th:text="${errorMessage}">Access Denied</h2>
        <p>You do not have permission to access this resource.<br>
           If you believe this is an error, please contact your system administrator.</p>
        <a th:href="@{/user/new}" class="button">← Return to Dashboard</a>
        <small>EMS Security Engine · © 2025 EMS India Pvt. Ltd.</small>
    </div>
</body>
</html>
