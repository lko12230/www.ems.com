<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="base1::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <title>View Task Details</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</head>
<body>
<section>
<style>
    .custom-dark-header {
        background-color: #000000 !important; /* Pure black */
        color: #ffffff !important; /* White text */
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .custom-dark-header i {
        font-size: 1.8rem; 
        color: #ffcc00; /* Gold color for contrast */
        margin-right: 10px;
    }
    .task-info {
        background-color: #f8f9fa;
        padding: 15px;
        border-radius: 10px;
    }
    .task-info .form-label {
        font-weight: bold;
    }
</style>

    <div class="container mt-5">
        <div class="card shadow-lg p-4">
            <!-- Task Details Header with List View Button -->
            <div class="custom-dark-header">
                <div class="d-flex align-items-center">
                    <i class="fas fa-eye"></i>
                    <h4 class="mb-0 text-uppercase">Task Details</h4>
                </div>
                <a th:href="@{'/user/ViewTaskList/' + ${task.id}}" class="btn btn-outline-light">
                    <i class="fas fa-list"></i> List View
                </a>
            </div>

            <div class="card-body">
                <div class="task-info">
                    <div class="mb-3">
                        <label class="form-label">Task ID:</label>
                        <p class="form-control-plaintext" th:text="${task.taskId}"></p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Team ID:</label>
                        <p class="form-control-plaintext" th:text="${userdetail.team}"></p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Employee ID:</label>
                        <p class="form-control-plaintext" th:text="${task.id}"></p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Employee Name:</label>
                        <p class="form-control-plaintext" th:text="${userdetail.username}"></p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Task Description:</label>
                        <p class="form-control-plaintext" th:text="${task.taskDescription}"></p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Status:</label>
                        <p class="form-control-plaintext">
                            <span th:if="${task.taskPending}" class="badge bg-warning">Pending</span>
                            <span th:if="${task.taskInProgress}" class="badge bg-primary">In Progress</span>
                            <span th:if="${task.taskCompleted}" class="badge bg-success">Completed</span>
                            <span th:if="${task.taskOverdue}" class="badge bg-danger">Overdue</span>
                        </p>
                    </div>
                </div>

                <!-- Back Button -->
                <div class="text-end mt-3">
                    <a th:href="@{'/user/ViewTaskList/' + ${task.id}}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Back
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
