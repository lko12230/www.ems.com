<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="base2::layout(~{::section})">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employee Management System</title>

    <!-- Bootstrap CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
        }
        .container-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            max-width: 500px;
            border: none;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
            text-align: center;
            padding: 30px;
        }
        .logo img {
            width: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
        }
        h4 {
            color: #333;
            font-weight: bold;
        }
        .btn-primary {
            background-color: #0056b3;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background-color: #003d82;
        }
        .footer-text {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container-wrapper">
        <div class="card">
            <div class="logo">
                <img src="https://bootdey.com/img/Content/avatar/avatar7.png" alt="Logo">
            </div>
            <h4>Employee Management System</h4>
            <p class="text-muted">Manage employee details and track attendance seamlessly</p>
            <a th:href="@{/signin}" class="btn btn-primary mt-3">Get Started</a>
            <p class="footer-text">Employee Management System Portal by <strong>Ayush Gupta</strong></p>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
