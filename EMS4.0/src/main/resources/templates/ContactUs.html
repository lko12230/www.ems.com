<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="base::layout(~{::section})">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Sign Up Form</title>
</head>

<body>
    <section>
        <div class="wrapper">
            <div class="logo">
                <img src="https://bootdey.com/img/Content/avatar/avatar7.png" alt="Logo">
            </div>
            <div class="text-center mt-4 name">
                <span style="color: royalblue;">w</span><span style="color: red;">w</span><span style="color: #F7B529;">w</span><span style="color: royalblue;">.</span><span style="color: limegreen;">e</span><span style="color: red;">m</span><span style="color: royalblue;">s</span><span style="color: red;">.</span><span style="color: #F7B529;">c</span><span style="color: royalblue;">o</span><span style="color: limegreen;">m</span>
            </div>

            <div th:if="${session.message}" th:classappend="${session.message.type}" class="alert text-center" role="alert">
                <p th:text="${session.message.content}"></p>
                <th:block th:text="${#session.removeAttribute('message')}"></th:block>
            </div>

            <form novalidate action="" id="myForm" th:action="@{/do-submit}" method="post" th:object="${contact}" enctype="multipart/form-data">
                
                <label>Full Name <span style="color: red;">*</span></label>
                <div class="form-field d-flex align-items-center">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="name" class="form-control" id="name"
                        th:classappend="${#fields.hasErrors('name')?'is-invalid':''}"
                        placeholder="Enter name" th:value="${contact.name}">
                    <div th:each="e : ${#fields.errors('name')}" th:text="${e}" class="invalid-feedback"></div>
                </div>
                
               <label>Email <span style="color: red;">*</span></label>
                <div class="form-field d-flex align-items-center">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" class="form-control" id="email"
                        th:classappend="${#fields.hasErrors('email')?'is-invalid':''}"
                        placeholder="Enter email" th:value="${contact.email}">
                    <div th:each="e : ${#fields.errors('email')}" th:text="${e}" class="invalid-feedback"></div>
                </div>
                
                <label>Phone <span style="color: red;">*</span></label>
                <div class="form-field d-flex align-items-center">
                    <i class="fa-solid fa-phone"></i>
                    <input type="text" name="phone" class="form-control" id="phone"
                        th:classappend="${#fields.hasErrors('phone')?'is-invalid':''}"
                        placeholder="Enter phone" th:value="${contact.phone}">
                    <div th:each="e : ${#fields.errors('phone')}" th:text="${e}" class="invalid-feedback"></div>
                </div>
                
                <label>Message <span style="color: red;">*</span></label>
                <div class="form-field d-flex align-items-center">
                    <i class="fa-solid fa-comment"></i>
                    <input type="text" name="message" class="form-control" id="message"
                        th:classappend="${#fields.hasErrors('message')?'is-invalid':''}"
                        placeholder="Enter message" th:value="${contact.message}">
                    <div th:each="e : ${#fields.errors('message')}" th:text="${e}" class="invalid-feedback"></div>
                </div>
                
                <div class="form-group form-check">
					<input type="checkbox" name="agreement" class="form-check-input" id="aggreement" />

					<label for="agreement">Accept terms and conditions</label>
				</div>
                
                
                <button type="submit" class="btn mt-3">Submit</button>
            </form>
        </div>
    </section>
</body>

</html>
